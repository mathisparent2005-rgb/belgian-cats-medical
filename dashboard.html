<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
    }

    header {
      background: #0B1F3A;
      color: #fff;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 17px; font-weight: 600; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
    }

    button.logout {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.logout:hover { background: rgba(255,255,255,0.22); }

    .content {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 32px;
    }

    .card h2 { font-size: 20px; margin-bottom: 8px; color: #111; }
    .card p  { font-size: 14px; color: #555; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <h1>Dashboard</h1>
  <div class="user-info">
    <span id="userEmail">Laden…</span>
    <button class="logout" onclick="logout()">Uitloggen</button>
  </div>
</header>

<div class="content">
  <div class="card">
    <h2>Welkom!</h2>
    <p>Je bent ingelogd. Hier komt de inhoud van je applicatie.</p>
  </div>
</div>

<script>
  // ─── SUPABASE CONFIG ───────────────────────────────────────────────────────
  const SUPABASE_URL  = 'JOUW_SUPABASE_URL';   // vervang dit
  const SUPABASE_KEY  = 'JOUW_SUPABASE_ANON_KEY'; // vervang dit
  // ──────────────────────────────────────────────────────────────────────────

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Controleer sessie bij laden — niet ingelogd → terug naar login
  db.auth.getSession().then(({ data: { session } }) => {
    if (!session) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('userEmail').textContent = session.user.email;
    }
  });

  // Sessie bijhouden bij refresh
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') window.location.href = 'login.html';
  });

  async function logout() {
    await db.auth.signOut();
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
